name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../terrarium-${{ matrix.target }}.tar.gz terrarium
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terrarium-${{ matrix.target }}
          path: terrarium-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: terrarium-*.tar.gz

  update-formula:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate SHA256 sums
        id: sha
        run: |
          echo "darwin_amd64=$(sha256sum terrarium-x86_64-apple-darwin.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=$(sha256sum terrarium-aarch64-apple-darwin.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum terrarium-x86_64-unknown-linux-gnu.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum terrarium-aarch64-unknown-linux-gnu.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: fenio/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Write formula
        run: |
          mkdir -p Formula
          cat > Formula/terrarium.rb << EOF
          class Terrarium < Formula
            desc "Terminal dashboard for managing tofu-controller Terraform and Flux Kustomization resources in Kubernetes"
            homepage "https://github.com/fenio/terrarium"
            version "${{ steps.version.outputs.version }}"
            license "GPL-3.0-or-later"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/fenio/terrarium/releases/download/${{ github.ref_name }}/terrarium-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              else
                url "https://github.com/fenio/terrarium/releases/download/${{ github.ref_name }}/terrarium-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_amd64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/fenio/terrarium/releases/download/${{ github.ref_name }}/terrarium-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              else
                url "https://github.com/fenio/terrarium/releases/download/${{ github.ref_name }}/terrarium-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_amd64 }}"
              end
            end

            def install
              bin.install "terrarium"
            end

            test do
              assert_match "terrarium", shell_output("#{bin}/terrarium --help")
            end
          end
          EOF

      - name: Push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/terrarium.rb
          git commit -m "Update terrarium to ${{ steps.version.outputs.version }}"
          git push
